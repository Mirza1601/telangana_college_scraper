name: Telangana College Scraper

on:
  schedule:
    - cron: "30 20 * * 0"

  workflow_dispatch:
    inputs:
      enrich_contacts:
        description: "Enrich with principal name + email (slower)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    name: Scrape Telangana Junior Colleges
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ENRICH_CONTACTS: ${{ github.event.inputs.enrich_contacts || 'false' }}
        run: python telangana_college_scraper_async.py

      # Always upload outputs even if the scraper fails
      - name: Upload Excel output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telangana-colleges-${{ github.run_id }}
          path: telangana_colleges.xlsx
          retention-days: 30

      # Upload debug HTML so we can inspect what the portal returned
      - name: Upload debug HTML (for diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-${{ github.run_id }}
          path: debug_html/
          retention-days: 7
          if-no-files-found: ignore
