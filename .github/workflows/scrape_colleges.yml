name: Telangana College Scraper

on:
  schedule:
    - cron: "30 20 * * 0"

  workflow_dispatch:
    inputs:
      enrich_contacts:
        description: "Enrich with principal name + email (slower)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    name: Scrape Telangana Junior Colleges
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ENRICH_CONTACTS: ${{ github.event.inputs.enrich_contacts || 'true' }}
        run: python telangana_college_scraper_async.py

      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        with:
          name: telangana-colleges-${{ github.run_id }}
          path: telangana_colleges.xlsx
          retention-days: 30
